name: test

on: 
  pull_request:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        runs-on: 
          - ubuntu-latest
          - macos-latest
        python-version: 
          - '3.10'
          - '3.11'
          - '3.12'
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    name: Python ${{ matrix.python-version }} (${{ matrix.runs-on }})
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: set useful environment variables
        run: |
          echo PYTHONVERSION=${{ matrix.python-version }} >> $GITHUB_ENV
          echo EXOCTK_DATA=$RUNNER_WORKSPACE/exoctk/exoctk/data/ >> $GITHUB_ENV
      - run: pip install .
      - run: pip freeze > requirements-py${{ matrix.python-version }}-${{ matrix.runs-on }}.txt
      - run: pip install .[test]
      - run: pytest exoctk/tests/ --cov ./ --cov-report term-missing --cov xml -n auto 
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: requirements-py${{ matrix.python-version }}-${{ matrix.runs-on }}
          path: requirements-py${{ matrix.python-version }}-${{ matrix.runs-on }}.txt
      - if: (github.event_name == 'release' && github.event.action == 'published')
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          file: requirements-py${{ matrix.python-version }}-${{ matrix.runs-on }}.txt

  # Create and start the ExoCTK, Redis, and Celery containers
  # Make test website queries using a shell script on the exoctk container.
  test-website:

    name: Website Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Create environment file
        run: |
          mkdir /tmp/exoctk
          mkdir /tmp/exoctk/data
          mkdir ./tmp
          touch ./docker/.env
          echo "export EXOCTK_DATA=/tmp/exoctk/data" >> ./docker/.env
          echo "export EXO_TMP=${CWD}/tmp" >> ./docker/.env
          echo "export WORKER_COUNT=1" >> ./docker/.env
          echo "export PYTHON_VERSION=3.11" >> ./docker/.env
          echo "export EXO_SOURCE=copy" >> ./docker/.env

      - name: Download ExoCTK Data
        working-directory: /tmp/exoctk/data
        run: |
          echo "Downloading ExoCTK Data"
          curl -L https://stsci.box.com/shared/static/grztwf220jnvamzv8ugb7phj9tlwnoi1 -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/zhrx2r6kgeovcnj78d4wicb7m2009qca -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/4q75kt2xelk3zox26vii1i3clnm7nzt7 -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/702r4nkccc484noiggq5xt13agbkkevp -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/zhrx2r6kgeovcnj78d4wicb7m2009qca -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/p64c53rky00ojz1gvabe9hqirpat9azz -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/1ag5x8ii1ko8h6lnoxwxljgdfw2mp894 -o output.zip
          unzip -o output.zip
          rm output.zip
          curl -L https://stsci.box.com/shared/static/vcn1ff9nzg2qx3pnkmsz17dujjdzlsh1 -o output.zip
          unzip -o output.zip
          rm output.zip
          echo "ExoCTK data is installed"
          

      - name: Start Redis
        run: docker compose up redis -d
        working-directory: ./docker

      - name: Start Celery
        run: docker compose up worker -d
        working-directory: ./docker

      - name: Start Exoctk
        run: docker compose up exoctk -d
        working-directory: ./docker

      - name: Get logs
        working-directory: ./docker
        run: |
            docker compose logs

      - name: Run tests
        working-directory: ./docker
        run: |
          docker compose exec -t exoctk /exoctk/exoctk_test_script.sh
